services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_connections=300
      - -c
      - shared_buffers=256MB
    environment:
      POSTGRES_DB: electric_agents
      POSTGRES_USER: electric_agents
      POSTGRES_PASSWORD: electric_agents
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electric_agents -d electric_agents"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - electric-agents-postgres-data:/var/lib/postgresql

  electric:
    image: electricsql/electric:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://electric_agents:electric_agents@postgres:5432/electric_agents
      ELECTRIC_INSECURE: "true"

  electric-agents:
    image: electricax/agents-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      electric:
        condition: service_started
    environment:
      ELECTRIC_AGENTS_LOG_LEVEL: debug
      # localhost:4437 so embedded durable-streams accepts the forward URL (localhost-only restriction)
      ELECTRIC_AGENTS_BASE_URL: http://localhost:4437
      DATABASE_URL: postgres://electric_agents:electric_agents@postgres:5432/electric_agents
      ELECTRIC_AGENTS_HOST: 0.0.0.0
      ELECTRIC_AGENTS_PORT: 4437
      ELECTRIC_AGENTS_STREAMS_DATA_DIR: /var/lib/electric-agents/streams
      ELECTRIC_AGENTS_DURABLE_STREAMS_URL: ""
      ELECTRIC_AGENTS_STREAMS_HOST: 127.0.0.1
      ELECTRIC_AGENTS_STREAMS_PORT: 0
      ELECTRIC_AGENTS_ELECTRIC_URL: http://electric:3000
      # rewrite localhost webhook delivery to host.docker.internal so server (network_mode:host) is reachable
      ELECTRIC_AGENTS_REWRITE_LOOPBACK_WEBHOOKS_TO: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4437:4437"
    volumes:
      - electric-agents-streams-data:/var/lib/electric-agents/streams

  neo4j:
    image: neo4j:5.26.2
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    # network_mode:host lets durable-streams accept http://localhost:3000/webhook.
    # On VPS with HTTPS use bridge networking and set SERVE_URL=https://yourdomain.com.
    network_mode: host
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELECTRIC_AGENTS_URL=http://localhost:4437
      - SERVE_URL=http://localhost:3000
      - GRAPHITI_URL=http://localhost:7001
      - PORT=3000
    restart: unless-stopped

  memory-processor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7001:7001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - ELECTRIC_AGENTS_URL=http://electric-agents:4437
      - ENTITY_TYPE=assistant
      - SEARCH_PORT=7001
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - processor_data:/data
    restart: unless-stopped

volumes:
  electric-agents-postgres-data:
  electric-agents-streams-data:
  neo4j_data:
  processor_data:
